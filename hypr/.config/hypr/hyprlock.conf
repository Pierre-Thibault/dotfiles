# Hyprlock configuration

general {
    hide_cursor = true
}

background {
    monitor =
    path = /home/pierre/.config/hypr/wallpaper.jpg
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(6F8396)
    inner_color = rgba(30, 30, 30, 0.5)
    font_color = rgb(ffffff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Mot de passe...</i>
    hide_input = false
    rounding = -1
    check_color = rgb(6F8396)
    fail_color = rgb(ff6b6b)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(ffcc00)
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(ffffff)
    font_size = 64
    font_family = Sans
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgb(ffffff)
    font_size = 20
    font_family = Sans
    position = 0, 80
    halign = center
    valign = center
}
