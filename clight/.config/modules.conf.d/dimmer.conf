dimmer:
{
    # disabled = true;

    # Inactivity timeout before dimming: [ AC (s), battery (s) ]
    timeouts = [ 120, 60 ];

    # Backlight level while dimmed (0.0 to 1.0)
    dimmed_pct = 0.15;

    # Transition duration (ms) for entering / leaving dimmed state
    trans_fixed = [ 1000, 500 ];
};
