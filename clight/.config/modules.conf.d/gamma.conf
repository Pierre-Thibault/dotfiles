gamma:
{
    # Disabled: clightd runs as root and cannot connect to the Wayland socket.
    # Use wlsunset for color temperature instead.
    disabled = true;

    # restore_on_exit = true;

    # Color temperature: [ day (K), night (K) ]
    temp = [ 6500, 3500 ];

    # Smooth transition when entering day/night
    trans_step    = 50;
    trans_timeout = 200;

    # Long redshift-like transitions around sunrise/sunset
    long_transition = true;

    # Tie temperature to backlight level instead of time-of-day
    # ambient_gamma = true;
};
